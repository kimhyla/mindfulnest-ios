# Reliability-tier: 3
# MindfulNest — Full Module Route Flow (LD-280 placeholder)
# Layer 4: Regression testing — module route smoke for the single-MP4 architecture.
#
# The old 7-screen flow (map → intro → phase_a → phase_b → resolution → win →
# decoration) was removed because LD-280 bans separate module phase screens.
# This Tier-3 flow is intentionally screenshot-only until Sprint C wires
# authenticated Maestro state + real Everdale sprite taps + progression gates.
# It should never reference the old scaffold button testID or legacy screen IDs.
#
# Runs pre-release only (not yet wired). See maestro/RELIABILITY_TIERS.md.
#
# Run: maestro test maestro/flows/full_module_flow.yaml

appId: com.mindfulnest.app
---
- launchApp
- waitForAnimationToEnd:
    timeout: 5000

# Initial app surface. If auth is not seeded, this may be sign-in; that is
# expected until the Tier-3 authenticated harness ships.
- takeScreenshot: flow_01_initial_surface

# Deep link the single module route directly. In unauthenticated test state this
# should land on the auth gate; in seeded pre-release runs it should reach
# /module/m1 loading/playback. Screenshots are the evidence until auth seeding
# and stable native assertions are wired.
- openLink: mindfulnest://module/m1
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: flow_02_module_route_or_auth_gate
