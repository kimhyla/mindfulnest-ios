# Reliability-tier: 3
# MindfulNest — Full Module Navigation Flow (testID-based)
# Layer 4: Regression testing — complete 7-screen navigation
# Tests flow: map → intro → phase_a → phase_b → resolution → win → decoration → map
# Updated: April 16, 2026 — switched from text: to id: selectors per Directus decision 118
# Tier 3: full integration (8x assertVisible end-to-end; depends on screens not all built yet).
# Runs pre-release only (not yet wired). See maestro/RELIABILITY_TIERS.md.
#
# Run: maestro test maestro/flows/full_module_flow.yaml

appId: com.mindfulnest.app
---
- launchApp
- waitForAnimationToEnd:
    timeout: 5000

# Screen 1: Map
- assertVisible:
    id: map_screen
- takeScreenshot: flow_01_map
- tapOn:
    id: map_start_module_button

# Screen 2: Intro (The Call)
- assertVisible:
    id: intro_screen
- takeScreenshot: flow_02_intro
- tapOn:
    id: intro_continue_button

# Screen 3: Phase A (Buy-In + Demo)
- assertVisible:
    id: phase_a_screen
- takeScreenshot: flow_03_phase_a
- tapOn:
    id: phase_a_continue_button

# Screen 4: Phase B (Guided Meditation)
- assertVisible:
    id: phase_b_screen
- takeScreenshot: flow_04_phase_b
- tapOn:
    id: phase_b_continue_button

# Screen 5: Resolution (The Rescue)
- assertVisible:
    id: resolution_screen
- takeScreenshot: flow_05_resolution
- tapOn:
    id: resolution_continue_button

# Screen 6: Win
- assertVisible:
    id: win_screen
- takeScreenshot: flow_06_win
- tapOn:
    id: win_continue_button

# Screen 7: Decoration
- assertVisible:
    id: decoration_screen
- takeScreenshot: flow_07_decoration
- tapOn:
    id: decoration_return_button

# Back to Map — verify full cycle
- assertVisible:
    id: map_screen
- takeScreenshot: flow_08_back_to_map
