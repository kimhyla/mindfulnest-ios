# MindfulNest — Smoke Test Flow
# Launches app and captures screenshot. No UI hierarchy assertions
# (iOS 26.4 + Maestro has intermittent kAXErrorInvalidUIElement issues).
# The screenshot itself is the verification — if the app renders, we see it.
#
# Run: maestro test maestro/flows/smoke_launch.yaml

appId: com.mindfulnest.app
---
- launchApp
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: smoke_home_screen
