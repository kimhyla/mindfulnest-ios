name: functions-ci
on:
  pull_request:
    paths:
      - 'functions/**'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/functions-ci.yml'
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/functions-ci.yml'

permissions:
  contents: read
  id-token: write

jobs:
  lint-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.11.0'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build (tsc)
        run: npm run build
      - name: Verify build output exists
        run: test -f lib/index.js
      - name: Unit tests (node --test)
        run: npm test
      - name: Verify generated schema lists are fresh
        run: |
          node scripts/gen-schema-lists.mjs
          git diff --exit-code src/schema/firestore-allowlists.generated.ts

  deploy-dry-run:
    name: firebase deploy --only functions --dry-run
    runs-on: ubuntu-latest
    needs: lint-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.11.0'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json
      - name: Install functions dependencies
        working-directory: functions
        run: npm ci
      - name: Install firebase-tools
        run: npm install -g firebase-tools@^15.15.0
      - name: Authenticate with Google Cloud via SA
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEV }}
      # google-github-actions/auth exports GOOGLE_APPLICATION_CREDENTIALS
      # pointing at a temp key file. firebase-tools picks it up automatically.
      - name: Validate deploy graph (dry-run)
        run: firebase deploy --only functions --project mindfulnestkids --dry-run --force --non-interactive
